<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Login - Blood Bank Management System</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <!-- Prevent flash of wrong theme -->
 <script>
 if (localStorage.getItem('theme') === 'dark') {
 document.documentElement.classList.add('dark');
 }
 </script>
 <!-- Alpine.js -->
 <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
 <script>
 tailwind.config = {
 darkMode: 'class',
 theme: {
 extend: {
 colors: { primary: '#C0392B', secondary: '#2C3E50' }
 }
 }
 }
 </script>
 <style>
 body { font-family: 'Inter', sans-serif; }
 h1 { font-family: 'Sora', sans-serif; }
 body, div, a, span, p, h1, input, button, label {
 transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
 }
 </style>
</head>
<body class="h-screen flex items-center justify-center p-4"
 x-data="{
 darkMode: localStorage.getItem('theme') === 'dark',
 toggleTheme() {
 this.darkMode = !this.darkMode;
 localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
 document.documentElement.classList.toggle('dark', this.darkMode);
 }
 }"
 x-init="document.documentElement.classList.toggle('dark', darkMode)">

 <!-- Theme Toggle (floating top-right) -->
 <button @click="toggleTheme()" id="login-theme-toggle"
 class="fixed top-5 right-5 inline-flex items-center justify-center w-10 h-10 rounded-full
 backdrop-blur-sm
 hover:bg-gray-200 dark:hover:bg-zinc-800
 border border-zinc-200 dark:border-zinc-800
 focus:outline-none focus:ring-2 focus:ring-primary/50
 transition-all duration-300 ease-in-out z-50"
 :title="darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
 <!-- Sun Icon (shown in dark mode) -->
 <svg x-show="darkMode" x-transition:enter="transition ease-out duration-200"
 x-transition:enter-start="opacity-0 rotate-[-90deg] scale-0"
 x-transition:enter-end="opacity-100 rotate-0 scale-100"
 class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
 <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
 </svg>
 <!-- Moon Icon (shown in light mode) -->
 <svg x-show="!darkMode" x-transition:enter="transition ease-out duration-200"
 x-transition:enter-start="opacity-0 rotate-90 scale-0"
 x-transition:enter-end="opacity-100 rotate-0 scale-100"
 class="w-5 h-5 text-zinc-600" fill="currentColor" viewBox="0 0 20 20">
 <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
 </svg>
 </button>

 <div class="max-w-md w-full rounded-xl overflow-hidden border border-zinc-200 dark:border-zinc-800">
 <div class="bg-primary p-8 text-center">
 <h1 class="text-3xl font-bold text-white uppercase tracking-widest">BDMng</h1>
 <p class="text-red-100 text-sm mt-1">Blood Bank Management System</p>
 </div>
 
 <div class="p-8">
 {% if form.errors %}
 <div class="bg-red-50 text-red-700 dark:text-red-300 p-3 rounded-lg text-sm mb-6 border border-red-100 dark:border-red-800">
 Invalid username or password. Please try again.
 </div>
 {% endif %}

 <form method="post" class="space-y-6">
 {% csrf_token %}
 <div>
 <label for="id_username" class="block text-sm font-bold text-zinc-700 dark:text-zinc-300 mb-2">Username</label>
 <input type="text" name="username" id="id_username" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 dark:border-zinc-700 dark:bg-gray-700 dark:text-zinc-200 focus:ring-primary focus:border-primary transition duration-200"
 placeholder="Enter your username">
 </div>
 
 <div>
 <div class="flex justify-between mb-2">
 <label for="id_password" class="block text-sm font-bold text-zinc-700 dark:text-zinc-300">Password</label>
 <a href="{% url 'accounts:password_reset' %}" class="text-xs text-primary hover:underline">Forgot password?</a>
 </div>
 <input type="password" name="password" id="id_password" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 dark:border-zinc-700 dark:bg-gray-700 dark:text-zinc-200 focus:ring-primary focus:border-primary transition duration-200"
 placeholder="••••••••">
 </div>

 <div class="flex items-center">
 <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-zinc-300 dark:border-zinc-700 rounded">
 <label for="remember-me" class="ml-2 block text-sm text-zinc-700 dark:text-zinc-300">Remember me</label>
 </div>

 <button type="submit" class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform active:scale-[0.98]">
 Sign In
 </button>
 </form>
 </div>
 
 <div class="p-4 text-center border-t border-zinc-200 dark:border-zinc-800">
 <p class="text-xs text-zinc-500 dark:text-zinc-400">Authorized Personnel Only</p>
 </div>
 </div>

</body>
</html>
