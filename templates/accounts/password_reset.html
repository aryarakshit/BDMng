<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Password Reset - Blood Bank Management System</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
 <style>body { font-family: 'Inter', sans-serif; }</style>
 <script>
 tailwind.config = {
 theme: { extend: { colors: { primary: '#C0392B', secondary: '#2C3E50' } } }
 }
 </script>
</head>
<body class="h-screen flex items-center justify-center p-4">
 <div class="max-w-md w-full rounded-xl overflow-hidden border border-zinc-200">
 <div class="bg-primary p-8 text-center">
 <h1 class="text-2xl font-bold text-white">Reset Your Password</h1>
 <p class="text-red-100 text-sm mt-1">Enter your email to receive a reset link</p>
 </div>
 <div class="p-8">
 <form method="post" class="space-y-6">
 {% csrf_token %}
 <div>
 <label for="id_email" class="block text-sm font-bold text-zinc-700 mb-2">Email Address</label>
 <input type="email" name="email" id="id_email" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-primary focus:border-primary transition duration-200"
 placeholder="you@example.com">
 </div>
 <button type="submit" class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
 Send Reset Link
 </button>
 </form>
 <div class="mt-4 text-center">
 <a href="{% url 'accounts:login' %}" class="text-sm text-primary hover:underline">Back to Login</a>
 </div>
 </div>
 </div>
</body>
</html>
