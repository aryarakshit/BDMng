{% extends "base.html" %}

{% block title %}Change Password - Blood Bank{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
 <div class="mb-6 flex items-center">
 <a href="{% url 'accounts:profile' %}" class="mr-4 text-zinc-500 hover:text-zinc-700">
 <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
 </a>
 <h1 class="text-2xl font-bold">Change Password</h1>
 </div>

 <div class="rounded-lg p-6">
 <form method="post" class="space-y-6">
 {% csrf_token %}
 <div>
 <label for="id_old_password" class="block text-sm font-bold text-zinc-700 mb-2">Current Password</label>
 <input type="password" name="old_password" id="id_old_password" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-red-500 focus:border-red-500 transition duration-200">
 </div>
 <div>
 <label for="id_new_password1" class="block text-sm font-bold text-zinc-700 mb-2">New Password</label>
 <input type="password" name="new_password1" id="id_new_password1" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-red-500 focus:border-red-500 transition duration-200">
 </div>
 <div>
 <label for="id_new_password2" class="block text-sm font-bold text-zinc-700 mb-2">Confirm New Password</label>
 <input type="password" name="new_password2" id="id_new_password2" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-red-500 focus:border-red-500 transition duration-200">
 </div>
 {% if form.errors %}
 <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-100">
 {% for field in form %}
 {% for error in field.errors %}
 <p>{{ error }}</p>
 {% endfor %}
 {% endfor %}
 </div>
 {% endif %}
 <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
 Change Password
 </button>
 </form>
 </div>
</div>
{% endblock %}
