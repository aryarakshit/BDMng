<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Set New Password - Blood Bank Management System</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
 <style>body { font-family: 'Inter', sans-serif; }</style>
 <script>
 tailwind.config = {
 theme: { extend: { colors: { primary: '#C0392B', secondary: '#2C3E50' } } }
 }
 </script>
</head>
<body class="h-screen flex items-center justify-center p-4">
 <div class="max-w-md w-full rounded-xl overflow-hidden border border-zinc-200">
 <div class="bg-primary p-8 text-center">
 <h1 class="text-2xl font-bold text-white">Set New Password</h1>
 </div>
 <div class="p-8">
 {% if validlink %}
 <form method="post" class="space-y-6">
 {% csrf_token %}
 <div>
 <label for="id_new_password1" class="block text-sm font-bold text-zinc-700 mb-2">New Password</label>
 <input type="password" name="new_password1" id="id_new_password1" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-primary focus:border-primary transition duration-200">
 </div>
 <div>
 <label for="id_new_password2" class="block text-sm font-bold text-zinc-700 mb-2">Confirm Password</label>
 <input type="password" name="new_password2" id="id_new_password2" required
 class="w-full px-4 py-3 rounded-lg border border-zinc-300 focus:ring-primary focus:border-primary transition duration-200">
 </div>
 {% if form.errors %}
 <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-100">
 {% for field in form %}
 {% for error in field.errors %}
 <p>{{ error }}</p>
 {% endfor %}
 {% endfor %}
 </div>
 {% endif %}
 <button type="submit" class="w-full bg-primary hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
 Reset Password
 </button>
 </form>
 {% else %}
 <div class="text-center">
 <p class="text-red-600 mb-4">This password reset link is invalid or has expired.</p>
 <a href="{% url 'accounts:password_reset' %}" class="inline-block bg-primary hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
 Request New Link
 </a>
 </div>
 {% endif %}
 </div>
 </div>
</body>
</html>
