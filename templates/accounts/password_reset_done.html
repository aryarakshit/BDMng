<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Password Reset Sent - Blood Bank Management System</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
 <style>body { font-family: 'Inter', sans-serif; }</style>
 <script>
 tailwind.config = {
 theme: { extend: { colors: { primary: '#C0392B', secondary: '#2C3E50' } } }
 }
 </script>
</head>
<body class="h-screen flex items-center justify-center p-4">
 <div class="max-w-md w-full rounded-xl overflow-hidden border border-zinc-200">
 <div class="bg-primary p-8 text-center">
 <h1 class="text-2xl font-bold text-white">Email Sent</h1>
 </div>
 <div class="p-8 text-center">
 <p class="text-zinc-700 mb-6">If an account exists with the email you entered, you will receive a password reset link shortly.</p>
 <a href="{% url 'accounts:login' %}" class="inline-block bg-primary hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
 Back to Login
 </a>
 </div>
 </div>
</body>
</html>
